name: docker-image

# Builds the fork Docker image per handoff/vroom-fork-env.md §5 and pushes
# to our GitLab registry on master pushes and tagged releases.
#
# Requires two GitHub repo secrets (created out-of-band by the project
# owner):
#   GITLAB_REGISTRY_USER   — GitLab deploy-token username
#   GITLAB_REGISTRY_TOKEN  — deploy token with write_registry scope
#
# When the secrets are absent (e.g. fork PR from a contributor), the job
# still builds the image locally as a smoke test but skips the push.

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
    paths:
      - 'docker/**'
      - 'src/**'
      - '.github/workflows/docker-image.yml'

env:
  REGISTRY: registry.gitlab.itnet.lviv.ua
  IMAGE: registry.gitlab.itnet.lviv.ua/busportal/backend/vroom-fork

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check registry secrets
        id: secrets
        run: |
          if [[ -n "${{ secrets.GITLAB_REGISTRY_USER }}" && -n "${{ secrets.GITLAB_REGISTRY_TOKEN }}" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Registry secrets not configured; building without push."
          fi

      - name: Login to GitLab registry
        if: steps.secrets.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          # Always emit the sha tag. Emit the symbolic tag only on push
          # events — pull_request events have `github.ref_name` =
          # "<number>/merge", which isn't a valid Docker reference.
          # Branch-named tags with slashes (feat/m3-co-located) are
          # also flattened to "feat-m3-co-located" for the same reason.
          tags="${{ env.IMAGE }}:${{ github.sha }}"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            safe_ref="${GITHUB_REF_NAME//\//-}"
            tags="$tags,${{ env.IMAGE }}:$safe_ref"
          fi
          echo "list=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ steps.secrets.outputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
